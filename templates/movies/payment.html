{% extends "users/basic.html" %}
{% block content %}

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg p-4 text-center">

        <h3 class="mb-2">🎬 BookMySeat Payment</h3>
        <p class="text-muted">Confirm your ticket booking</p>

        <hr>

        <div class="mb-3">
          <h5>Movie</h5>
          <p class="fw-bold">{{ booking.movie.name }}</p>
        </div>

        <div class="mb-3">
          <h5>Theater</h5>
          <p class="fw-bold">{{ booking.theater.name }}</p>
        </div>

        <div class="mb-3">
          <h5>Seat</h5>
          <p class="fw-bold">{{ booking.seat.seat_number }}</p>
        </div>

        <div class="alert alert-success fs-5 fw-bold">
          Pay ₹{{ booking.total_price }}
        </div>

        <button id="rzp-button" class="btn btn-success btn-lg w-100">
          Pay Securely Now
        </button>

        <p class="mt-3 text-muted" style="font-size:13px;">
          🔒 Secured by Razorpay
        </p>

      </div>

    </div>
  </div>
</div>

<!-- DO NOT TOUCH BELOW CODE -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    key: "{{ razorpay_key }}",
    amount: "{{ booking.total_price }}00",
    currency: "INR",
    name: "BookMySeat",
    description: "Movie Ticket Payment",
    order_id: "{{ order.id }}",

   handler: function (response) {
    window.location.href =
      "/movies/payment-success/?booking_id={{ booking.id }}" +
      "&razorpay_payment_id=" + response.razorpay_payment_id +
      "&razorpay_order_id=" + response.razorpay_order_id +
      "&razorpay_signature=" + response.razorpay_signature;
}

};

var rzp1 = new Razorpay(options);

document.getElementById("rzp-button").addEventListener("click", function(e){
    rzp1.open();
    e.preventDefault();
});
</script>

{% endblock %}
